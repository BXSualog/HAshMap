<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-wrapper">
        <div class="login-brand">
            <div class="wordmark">Alisto:<span class="accent">Go</span></div>
        </div>

        <div class="card">
            <h2 class="card-title">Welcome!</h2>
            <div class="card-subtitle">Maging Kalmado, stay ALISTO</div>

            <form id="loginForm">
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <span class="toggle-password" data-target="password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="eye-icon">
                                <path class="eye-lid" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle class="eye-pupil" cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                    </div>
                </div>

                <button type="submit">Login</button>
                <p id="message"></p>
            </form>

            <div class="card-footer">
                <span>Don't have an account?</span>
                <a href="../sign_up/sign_up.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>

    <script>
        document.querySelectorAll('.toggle-password').forEach(toggle => {
            toggle.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.add('is-visible');
                } else {
                    input.type = 'password';
                    this.classList.remove('is-visible');
                }
            });
        });
    </script>
</body>

</html>
